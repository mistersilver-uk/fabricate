# SonarCloud project configuration (Automatic Analysis).
#
# This repo runs SonarCloud Automatic Analysis (there is no in-CI scanner step);
# the keys below are the analysis-scope settings Automatic Analysis honours from
# sonar-project.properties. Source/test auto-detection is left to SonarCloud.

# Copy-paste detection (CPD) exclusions.
#
# The ApplicationV2 + Svelte UI shells are validated by SOURCE-SHAPE tests (the
# .svelte and *.svelte.js shells are not compiled in the Node test runner, so each
# is pinned by a `tests/components/*-app.test.js` that asserts the shell's
# strings). Those assertion suites deliberately share the SAME describe-block
# scaffold across the browser, config, and manager app tests — the
# singleton-window / services-bag / row-action blocks are intentionally parallel
# for readability — so SonarCloud's CPD flags them as duplicated new code even
# though the repetition is the intended test convention. Exclude the test tree
# from duplication detection (product-code duplication is still measured) so this
# convention does not trip the new-code duplicated-lines Quality Gate.
#
# The Playwright smoke harness (scripts/foundry-test-run.mjs) is likewise test
# infrastructure: its per-view "open window → wait → assert-no-overlay →
# screenshot → close" capture sequences are intentionally repeated per captured
# state and read more clearly inline than behind an over-abstracted helper, so its
# duplication is excluded for the same reason as the unit-test tree.
sonar.cpd.exclusions=tests/**/*,scripts/foundry-test-run.mjs

# Coverage exclusions: the ApplicationV2 + Svelte UI shells are not executable by
# the Node test runner (no DOM / Foundry runtime), so their lines can never be
# covered by unit tests. Their pure decision helpers (canvas/regions/*) ARE unit
# tested directly. Exclude the non-executable UI shells + tooling from coverage so
# they do not depress new-code coverage if a coverage report is ever imported.
sonar.coverage.exclusions=src/ui/**/*.svelte,src/ui/**/*.svelte.js,scripts/**/*,styles/**/*
