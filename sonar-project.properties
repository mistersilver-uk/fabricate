# SonarCloud project configuration (Automatic Analysis).
#
# This repo runs SonarCloud Automatic Analysis (there is no in-CI scanner step).
# IMPORTANT: Automatic Analysis honours only a SUBSET of sonar-project.properties.
# `sonar.cpd.exclusions` (below) is INERT under Automatic Analysis — it is NOT
# read, so the paths it lists still count against the duplication Quality Gate
# (scripts/** is listed here and still counts). It is kept for intent/history and
# for any future in-CI scanner run, NOT because it changes the current gate.
#
# The durable escape hatch for a false-positive duplication is the maintainer-set
# **Duplication Exclusion** in the SonarCloud project UI
# (Administration → General Settings → Analysis Scope → Duplications), which
# Automatic Analysis DOES honour. For the release-workflow preamble that this
# file's `scripts/**` entry could not exclude, the actual mitigation is the
# `.github/actions/release-setup` composite action (issue #628, task 2.4), which
# removes the duplication at the source rather than trying to suppress its report.
# `sonar.coverage.exclusions` further down is retained on the same understanding.

# Copy-paste detection (CPD) exclusions — INERT under Automatic Analysis (see above).
#
# The intent recorded here (were these honoured, or under an in-CI scanner): the
# ApplicationV2 + Svelte UI shells are validated by SOURCE-SHAPE tests (the
# .svelte and *.svelte.js shells are not compiled in the Node test runner, so each
# is pinned by a `tests/components/*-app.test.js` that asserts the shell's
# strings). Those assertion suites deliberately share the SAME describe-block
# scaffold across the browser, config, and manager app tests — the
# singleton-window / services-bag / row-action blocks are intentionally parallel
# for readability — so SonarCloud's CPD flags them as duplicated new code even
# though the repetition is the intended test convention.
#
# The Playwright smoke harness (scripts/foundry-test-run.mjs) is likewise test
# infrastructure: its per-view "open window → wait → assert-no-overlay →
# screenshot → close" capture sequences are intentionally repeated per captured
# state and read more clearly inline than behind an over-abstracted helper.
sonar.cpd.exclusions=tests/**/*,scripts/**/*

# Coverage exclusions: the ApplicationV2 + Svelte UI shells are not executable by
# the Node test runner (no DOM / Foundry runtime), so their lines can never be
# covered by unit tests. Their pure decision helpers (canvas/regions/*) ARE unit
# tested directly. Exclude the non-executable UI shells + tooling from coverage so
# they do not depress new-code coverage if a coverage report is ever imported.
sonar.coverage.exclusions=src/ui/**/*.svelte,src/ui/**/*.svelte.js,scripts/**/*,styles/**/*
