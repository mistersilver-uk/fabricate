title: Fabricate
description: A system-agnostic crafting module for Foundry Virtual Tabletop
theme: just-the-docs

url: https://misterpotts.github.io
baseurl: /fabricate

aux_links:
  "GitHub":
    - https://github.com/misterpotts/fabricate

nav_sort: order

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

color_scheme: dark

callouts:
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  gm:
    title: GM Only
    color: purple

sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions
