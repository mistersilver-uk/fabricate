# Docker Compose harness for disposable Foundry VTT smoke-test environment.
#
# Usage:
#   npm run test:foundry:up      # start containers
#   npm run test:foundry:run     # run Playwright smoke test
#   npm run test:foundry:down    # stop and remove containers
#   npm run test:foundry         # up + run + down (CI mode)
#
# Prerequisites:
#   - Set FOUNDRY_USERNAME and FOUNDRY_PASSWORD in .env.foundry (local)
#     or as GitHub secrets FOUNDRY_USERNAME / FOUNDRY_PASSWORD (CI).
#   - The Fabricate module dist/ must already be built before starting.
#
# The Foundry image is felddy/foundryvtt — a well-known community image that
# handles license activation automatically via credentials.
#
# Note on volumes: a named volume (foundry-data) persists the Foundry VTT
# installation between runs to avoid re-downloading and hitting rate limits.
# Bind mounts overlay specific paths under /home/foundry/data/Data/ for the
# module, world fixture, and game system.

services:
  foundry:
    image: felddy/foundryvtt:release
    container_name: fabricate-foundry-test
    ports:
      - "30000:30000"
    environment:
      FOUNDRY_USERNAME: "${FOUNDRY_USERNAME}"
      FOUNDRY_PASSWORD: "${FOUNDRY_PASSWORD}"
      FOUNDRY_ADMIN_KEY: "fabricate-test-admin"
      CONTAINER_PRESERVE_CONFIG: "true"
      FOUNDRY_WORLD: "fabricate-smoke"
    volumes:
      # Persist Foundry installation between runs to avoid re-downloading (rate limits)
      - foundry-data:/home/foundry/data
      # Mount built module into the Foundry modules directory
      - ./dist:/home/foundry/data/Data/modules/fabricate:ro
      # Mount test world fixture (writable — Foundry creates db files on launch)
      - ./.foundry-e2e/worlds/fabricate-smoke:/home/foundry/data/Data/worlds/fabricate-smoke
      # Mount pre-downloaded game system (fetched by scripts/foundry-fetch-systems.mjs)
      - ./.foundry-e2e/systems/dnd5e:/home/foundry/data/Data/systems/dnd5e:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: "no"

volumes:
  foundry-data:
