# Docker Compose harness for disposable Foundry VTT smoke-test environment.
#
# Usage:
#   npm run test:foundry:up      # start containers
#   npm run test:foundry:run     # run Playwright smoke test
#   npm run test:foundry:down    # stop container and keep cached install
#   npm run test:foundry         # up + run + down (CI mode)
#
# Prerequisites:
#   - Set FOUNDRY_USERNAME and FOUNDRY_PASSWORD in .env.foundry (local)
#     or as GitHub secrets FOUNDRY_USERNAME / FOUNDRY_PASSWORD (CI).
#   - The Fabricate module dist/ must already be built before starting.
#   - Run `node scripts/foundry-setup-data.mjs` to prepare the data directory
#     (called automatically by foundry-test-up.mjs).
#
# The Foundry image is felddy/foundryvtt — a well-known community image that
# handles license activation automatically via credentials.
#
# Note on caching: foundry-test-down stops the container by default instead of
# removing it, preserving the extracted Foundry application and avoiding repeat
# release-service requests. Use --clean when a full reset is required. The
# container_cache mount also persists the installation archive.

services:
  foundry:
    image: "${FOUNDRY_IMAGE:-felddy/foundryvtt:13}"
    container_name: fabricate-foundry-test
    # Run the container as the host user so bind-mounted volumes are writable.
    # The v13 image runs as 1000:1000 by default; on GitHub Actions the runner
    # is 1001:1001. foundry-test-up.mjs sets FOUNDRY_HOST_UID/GID before
    # docker compose up.
    user: "${FOUNDRY_HOST_UID:-1000}:${FOUNDRY_HOST_GID:-1000}"
    ports:
      - "${FOUNDRY_HOST_PORT:-30100}:30000"
    environment:
      FOUNDRY_USERNAME: "${FOUNDRY_USERNAME}"
      FOUNDRY_PASSWORD: "${FOUNDRY_PASSWORD}"
      FOUNDRY_RELEASE_URL: "${FOUNDRY_RELEASE_URL:-}"
      FOUNDRY_ADMIN_KEY: "fabricate-test-admin"
      CONTAINER_PRESERVE_CONFIG: "true"
      CONTAINER_CACHE: "/data/container_cache"
      FOUNDRY_WORLD: "fabricate-smoke-ci"
    volumes:
      # Full user data directory (assembled by foundry-setup-data.mjs)
      - ./.foundry-e2e/data:/data
      # Cache Foundry installation archive to avoid re-downloading (rate limits)
      - ./.foundry-e2e/cache:/data/container_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: "no"
