<!doctype html>
<html lang="en" class="view-lab-html">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fabricate View Lab</title>
    <!--
      Load order is load-bearing (Design C): compat @layer superset FIRST, then the
      Font Awesome glyph classes + bundled Signika/--font-primary, then production
      fabricate.css (unlayered, so it wins), then component-injected styles at mount.
      @layer precedence — NOT load order — is what reproduces Foundry's cascade.
    -->
    <link rel="stylesheet" href="/tests/fixtures/foundry-core-min.css" />
    <link rel="stylesheet" href="/assets/fonts/fontawesome/css/all.css" />
    <link rel="stylesheet" href="/tests/view-lab/view-lab-fonts.css" />
    <link rel="stylesheet" href="/styles/fabricate.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      /* The application-frame the case renders inside; the capture targets it, not
         the page, so give it an intrinsic size and let the case viewport bound it. */
      .view-lab-frame {
        width: max-content;
        min-width: 240px;
        max-width: 100%;
        border: 1px solid var(--fab-border, #444);
      }
    </style>
  </head>
  <body class="game">
    <script type="module" src="/tests/view-lab/mount.js"></script>
  </body>
</html>
