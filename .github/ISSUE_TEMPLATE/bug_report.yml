name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["triage", "bug"]
body:
  - type: input
    id: foundry-version
    attributes:
      label: Foundry VTT Version
      placeholder: e.g. 12.331
    validations:
      required: true
  - type: input
    id: fabricate-version
    attributes:
      label: Fabricate Version
      placeholder: e.g. 2.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open the crafting tab
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Paste any relevant console output or attach screenshots.
    validations:
      required: false
