name: "Release Candidate"

on:
  push:
    branches:
      - main

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm test
      - run: npm run build

  smoke-test:
    needs: unit-tests
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/foundry-integration.yml
    secrets: inherit

  release-candidate:
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      rc_tag: ${{ steps.detect_rc_tag.outputs.rc_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Record prerelease tags at HEAD before semantic-release
        run: |
          git fetch --tags --force
          # `--filter` echoes the tags that match the shared release-tag patterns and always
          # exits 0 (no tag at HEAD is the normal case). It replaces a hand-copied `grep -E`
          # that recognised `-rc.N` only. See scripts/lib/releaseTags.js.
          git tag --points-at HEAD -l "v*-*" \
            | node scripts/validate-release-tag.mjs --filter --kind beta \
            | sort > "$RUNNER_TEMP/rc-tags-before.txt"

          echo "Prerelease tags at HEAD before semantic-release:"
          cat "$RUNNER_TEMP/rc-tags-before.txt" || true
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Detect new RC tag at HEAD
        id: detect_rc_tag
        run: |
          git fetch --tags --force
          git tag --points-at HEAD -l "v*-*" \
            | node scripts/validate-release-tag.mjs --filter --kind beta \
            | sort > "$RUNNER_TEMP/rc-tags-after.txt"

          echo "Prerelease tags at HEAD after semantic-release:"
          cat "$RUNNER_TEMP/rc-tags-after.txt" || true

          comm -13 "$RUNNER_TEMP/rc-tags-before.txt" "$RUNNER_TEMP/rc-tags-after.txt" \
            > "$RUNNER_TEMP/rc-tags-new.txt"

          NEW_COUNT=$(awk 'NF { count++ } END { print count + 0 }' "$RUNNER_TEMP/rc-tags-new.txt")

          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "No new RC tag was created by semantic-release; skipping S3 publishing."
            echo "rc_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$NEW_COUNT" -gt 1 ]; then
            echo "::error::semantic-release produced multiple new RC tags at HEAD; expected exactly one."
            cat "$RUNNER_TEMP/rc-tags-new.txt"
            exit 1
          fi

          RC_TAG=$(cat "$RUNNER_TEMP/rc-tags-new.txt")
          echo "Detected new RC tag: $RC_TAG"
          echo "rc_tag=$RC_TAG" >> "$GITHUB_OUTPUT"

  publish-s3:
    needs: release-candidate
    if: ${{ needs.release-candidate.outputs.rc_tag != '' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/release-s3.yml
    with:
      rc_tag: ${{ needs.release-candidate.outputs.rc_tag }}
      dry_run: false
      overwrite: false
    secrets:
      # Reusable workflows don't inherit repo secrets; pass the tester-path secret
      # through explicitly so the publish can write to the (unguessable) feed path.
      S3_TESTER_PATH_SECRET: ${{ secrets.S3_TESTER_PATH_SECRET }}
