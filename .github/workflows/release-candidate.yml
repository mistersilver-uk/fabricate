name: "Release Candidate"

on:
  push:
    branches:
      - main

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  smoke-test:
    needs: unit-tests
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/foundry-integration.yml
    secrets: inherit

  release-candidate:
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
