name: CI

on:
  pull_request:
    # `edited` lets title/screenshot checks re-run when the PR title or body is
    # fixed after opening. The expensive unit-tests job opts out of `edited`
    # (see its `if:`), so description tweaks only re-run the cheap metadata jobs.
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    # Skip on `edited` PR events: editing the title/body doesn't change the head
    # commit, so the existing result for that SHA still stands. Runs on push and
    # all other PR events (opened/synchronize/reopened).
    if: github.event_name != 'pull_request' || github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit tests
        run: npm test

      - name: Build module
        run: npm run build

  validate-bindings:
    # Pure-Node consistency check for the agent role bindings (skills <-> Codex
    # <-> Claude <-> AGENTS.md table). No install needed — the script has no deps.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate agent bindings
        run: npm run validate:agents

  lint-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: |
          # Lint all commits on this PR (from base to HEAD)
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

      - name: Lint PR title
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Read the live title (not the event payload) so a re-run or `edited`
          # event always lints the current PR title.
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title --jq .title)
          echo "$PR_TITLE" | npx commitlint --verbose

  check-screenshots:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check for screenshots in UI/UX PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Read the live body (not the event payload) so a re-run or `edited`
          # event sees screenshots added after the PR was opened.
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq .body)
          printf '%s\n' "$PR_BODY" > pr-body.md

          # Get changed files
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --name-only)
          printf '%s\n' "$CHANGED_FILES" > changed-files.txt

          node scripts/ui-pr-screenshot-evidence.mjs check \
            --changed-files changed-files.txt \
            --body-file pr-body.md \
            --pr "$PR_NUMBER"
