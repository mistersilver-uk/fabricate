name: CI

on:
  pull_request:
    # `edited` lets title/screenshot checks re-run when the PR title or body is
    # fixed after opening. The expensive unit-tests job opts out of `edited`
    # (see its `if:`), so description tweaks only re-run the cheap metadata jobs.
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    # Skip on `edited` PR events: editing the title/body doesn't change the head
    # commit, so the existing result for that SHA still stands. Runs on push and
    # all other PR events (opened/synchronize/reopened).
    if: github.event_name != 'pull_request' || github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit tests
        run: npm test

      - name: Build module
        run: npm run build

  lint-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: |
          # Lint all commits on this PR (from base to HEAD)
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

      - name: Lint PR title
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Read the live title (not the event payload) so a re-run or `edited`
          # event always lints the current PR title.
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title --jq .title)
          echo "$PR_TITLE" | npx commitlint --verbose

  check-screenshots:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for screenshots in UI/UX PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Read the live body (not the event payload) so a re-run or `edited`
          # event sees screenshots added after the PR was opened.
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq .body)

          # Get changed files
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --name-only 2>/dev/null || echo "")

          # Check if any UI-related files changed
          UI_CHANGED=false
          while IFS= read -r file; do
            case "$file" in
              src/ui/*|styles/*|*.svelte|*.css)
                UI_CHANGED=true
                break
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$UI_CHANGED" = "false" ]; then
            echo "No UI files changed — screenshot check skipped."
            exit 0
          fi

          echo "UI files changed — checking PR body for screenshots..."

          # Check PR body for actual image evidence or an explicit handoff marker.
          if echo "$PR_BODY" | grep -qiE '!\[.*\]\(.*\)|<img\s|https?://[^[:space:])]+\.(png|jpg|jpeg|gif|webp)|test-results/[^[:space:])]+\.(png|jpg|jpeg|gif|webp)|SCREENSHOTS_NEEDED:'; then
            echo "Screenshot evidence or explicit handoff marker found in PR description."
            exit 0
          fi

          echo "::error::This PR changes UI files but the description contains no screenshot evidence or SCREENSHOTS_NEEDED marker."
          echo "Please add before/after screenshots to the PR description, link to screenshot artifacts, or add SCREENSHOTS_NEEDED with a reason."
          exit 1
