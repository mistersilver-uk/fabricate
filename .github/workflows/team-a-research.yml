name: "Team A: Research & Audit"

on:
  schedule:
    - cron: '0 6 * * 1'            # Weekly: Monday 06:00 UTC
  workflow_dispatch:               # Manual trigger

concurrency:
  group: team-a-research
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ── Phase 1: Domain Expert ───────────────────────────────────────────
  domain-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebSearch,WebFetch"
          prompt: |
            You are the domain-expert agent for Fabricate. Read your agent
            definition at .claude/agents/domain-expert.md and follow it exactly.

            Your task:
            1. Read DOMAIN.md and all spec/ files for current state.
            2. Audit spec-vs-code alignment for naming, structure, and lifecycle.
            3. UPDATE (do not overwrite) DOMAIN.md with any new findings — append
               to existing sections, update stale entries, add new open questions.
            4. For each actionable finding, create a GitHub Issue with the `triage`
               label using `gh issue create --label domain --label triage`.
            5. NEVER remove the `triage` label from any issue. Only humans may do that.
            6. Before creating an issue, search existing issues to avoid duplicates:
               `gh issue list --state open --label domain --json number,title --limit 100`

            Output a summary of findings and issues created.

  # ── Phase 2: UX Designer ─────────────────────────────────────────────
  ux-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run test:foundry:install

      - name: Build module
        run: npm run build

      - uses: anthropics/claude-code-action@v1
        env:
          FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
          FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 40
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            You are the ux-designer agent for Fabricate. Read your agent
            definition at .claude/agents/ux-designer.md and follow it exactly.

            You have access to Playwright (already installed: `npm run test:foundry:install`
            has been run) and a built module in dist/. The Foundry credentials are
            in environment variables FOUNDRY_USERNAME and FOUNDRY_PASSWORD.

            Your task:
            1. Read spec/003-ui-integration.md and all Svelte components in
               src/ui/svelte/ to understand the current UI structure.
            2. Run the Foundry smoke harness to capture live screenshots:
               ```
               npm run test:foundry:up
               npm run test:foundry:run
               npm run test:foundry:down
               ```
            3. Review the screenshots in test-results/ to audit the real rendered UI.
               The smoke test populates realistic test data (2 actors with inventories,
               a crafting system with 7 components and 3 recipes, post-craft state)
               and produces 13 labeled screenshots covering every major UI surface:
               - Items sidebar with crafting items
               - Actor character sheets on the inventory tab
               - Recipe Manager: all 5 tabs (Systems, Components, Recipes, Rules, Graph)
                 with the "Arcane Forge" system selected
               - Crafting App with craftable recipes listed
               - Post-craft inventory showing consumed ingredients and crafted output
               Read .claude/agents/ux-designer.md for the full screenshot catalog table.
            4. Audit components against the spec, design principles, and
               accessibility standards (WCAG AA). Consider both static code review
               and the live screenshots.
            5. For each actionable finding, create a GitHub Issue with the `triage`
               label using `gh issue create --label ux --label triage`.
            6. NEVER remove the `triage` label from any issue. Only humans may do that.
            7. Before creating an issue, search existing issues to avoid duplicates:
               `gh issue list --state open --label ux --json number,title --limit 100`
            8. If the smoke test fails (e.g. Foundry credentials are not set),
               fall back to static code review only and note this in each issue.

            Output a summary of findings and issues created.

  # ── Phase 3: Quality Engineer ────────────────────────────────────────
  quality-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            You are the quality-engineer agent for Fabricate. Read your agent
            definition at .claude/agents/quality-engineer.md and follow it exactly.

            Your task:
            1. Run `npm test` and `npm run build` to check current state.
            2. Scan src/, tests/, and styles/ for defects, edge cases, and test gaps.
            3. For each validated finding, create a GitHub Issue with the `triage`
               label using `gh issue create --label <type> --label triage`
               where <type> is `defect`, `test-gap`, or `enhancement`.
            4. NEVER remove the `triage` label from any issue. Only humans may do that.
            5. Before creating an issue, search existing issues to avoid duplicates:
               `gh issue list --state open --json number,title --limit 100`

            Output a summary of findings and issues created.

  # ── Phase 4: Competitive Analyst ─────────────────────────────────────
  competitive-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebSearch,WebFetch"
          prompt: |
            You are the competitive-analyst agent for Fabricate. Read your agent
            definition at .claude/agents/competitive-analyst.md and follow it exactly.

            Your task:
            1. Read the existing COMPETITIVE_ANALYSIS.md (if it exists).
            2. Read Fabricate's docs/, spec/, src/ui/svelte/, and CHANGELOG.md
               to understand current capabilities.
            3. Research competitors and monetisation landscape per your agent definition.
            4. UPDATE (do not overwrite) COMPETITIVE_ANALYSIS.md with new findings.
               Add a dated changelog entry at the top noting what changed.
            5. For each actionable recommendation that implies a concrete code or
               feature change, create a GitHub Issue with the `triage` label using
               `gh issue create --label enhancement --label triage`.
            6. NEVER remove the `triage` label from any issue. Only humans may do that.
            7. Before creating an issue, search existing issues to avoid duplicates:
               `gh issue list --state open --json number,title --limit 100`

            Output a summary of findings, report updates, and issues created.

  # ── Phase 5: Collect results and raise PR ────────────────────────────
  raise-pr:
    needs: [domain-audit, ux-audit, quality-scan, competitive-analysis]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools "Bash,Read,Glob,Grep"
          prompt: |
            Check if there are any uncommitted changes to DOMAIN.md,
            COMPETITIVE_ANALYSIS.md, docs/, or spec/ files from the research phases.

            If changes exist:
            1. Create a branch: `git checkout -b research/weekly-$(date +%Y-%m-%d)`
            2. Stage and commit only DOMAIN.md, COMPETITIVE_ANALYSIS.md, docs/,
               and spec/ changes.
               Commit message: "chore: weekly research audit updates"
            3. Push and open a PR:
               ```
               gh pr create \
                 --title "Weekly Research Audit — $(date +%Y-%m-%d)" \
                 --label agent-created \
                 --body "Automated weekly research updates from Team A.
                         Review DOMAIN.md, COMPETITIVE_ANALYSIS.md changes and
                         new triage issues before merging."
               ```

            If no changes exist, output "No research updates this week." and stop.

            NEVER remove the `triage` label from any issue.