name: "Team A: Codex Research & Audit Manual Only"

on:
  workflow_dispatch:

concurrency:
  group: team-a-research
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  CODEX_MODEL: gpt-5.5

jobs:
  smoke-test:
    uses: ./.github/workflows/foundry-integration.yml
    secrets: inherit

  domain-audit:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create research branch
        run: git checkout -b "research/domain-audit-${{ github.run_number }}-${{ github.run_attempt }}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Codex domain audit
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-a-domain.md
          output-file: codex-domain-output.md

      - name: Push domain update PR if files changed
        run: |
          OUT_OF_SCOPE=$(git status --porcelain --untracked-files=normal -- . ':!DOMAIN.md' ':!codex-domain-output.md' ':!pr-body.md')
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "::error::Domain audit left uncommitted changes outside its ownership:"
            printf '%s\n' "$OUT_OF_SCOPE"
            exit 1
          fi

          if git diff --quiet && git diff --cached --quiet && [ "$(git rev-list origin/${{ github.event.repository.default_branch || 'main' }}..HEAD --count)" -eq 0 ]; then
            echo "No DOMAIN.md changes."
            exit 0
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add DOMAIN.md
            git commit -m "chore: update domain audit"
          fi

          INVALID=$(git diff --name-only "origin/${{ github.event.repository.default_branch || 'main' }}..HEAD" | grep -Ev '^DOMAIN.md$' || true)
          if [ -n "$INVALID" ]; then
            echo "::error::Domain audit changed files outside its ownership:"
            printf '%s\n' "$INVALID"
            exit 1
          fi

          BRANCH=$(git branch --show-current)
          git push origin "$BRANCH"

          {
            echo "## Summary"
            echo
            echo "Codex Team A domain audit updates."
            echo
            echo "## Codex Output"
            echo
            cat codex-domain-output.md
          } > pr-body.md

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --title "chore: update domain audit" \
            --label agent-created \
            --body-file pr-body.md

      - name: Upload domain audit output
        uses: actions/upload-artifact@v4
        with:
          name: codex-domain-audit-${{ github.run_number }}
          path: codex-domain-output.md

  ux-audit:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Download smoke test screenshots
        uses: actions/download-artifact@v4
        with:
          name: foundry-smoke-results-${{ github.run_number }}
          path: test-results/
        continue-on-error: true

      - name: Run Codex UX audit
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-a-ux.md
          output-file: codex-ux-output.md

      - name: Ensure UX audit remained read-only
        run: git diff --exit-code

      - name: Upload UX audit output
        uses: actions/upload-artifact@v4
        with:
          name: codex-ux-audit-${{ github.run_number }}
          path: codex-ux-output.md

  quality-scan:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Codex quality scan
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-a-quality.md
          output-file: codex-quality-output.md

      - name: Ensure quality scan remained read-only
        run: git diff --exit-code

      - name: Upload quality scan output
        uses: actions/upload-artifact@v4
        with:
          name: codex-quality-scan-${{ github.run_number }}
          path: codex-quality-output.md

  competitive-analysis:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create competitive branch
        run: git checkout -b "research/competitive-analysis-${{ github.run_number }}-${{ github.run_attempt }}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Codex competitive analysis
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-a-competitive.md
          output-file: codex-competitive-output.md

      - name: Push competitive update PR if files changed
        run: |
          OUT_OF_SCOPE=$(git status --porcelain --untracked-files=normal -- . ':!COMPETITIVE_ANALYSIS.md' ':!codex-competitive-output.md' ':!pr-body.md')
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "::error::Competitive analysis left uncommitted changes outside its ownership:"
            printf '%s\n' "$OUT_OF_SCOPE"
            exit 1
          fi

          if git diff --quiet && git diff --cached --quiet && [ "$(git rev-list origin/${{ github.event.repository.default_branch || 'main' }}..HEAD --count)" -eq 0 ]; then
            echo "No COMPETITIVE_ANALYSIS.md changes."
            exit 0
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add COMPETITIVE_ANALYSIS.md
            git commit -m "chore: update competitive analysis"
          fi

          INVALID=$(git diff --name-only "origin/${{ github.event.repository.default_branch || 'main' }}..HEAD" | grep -Ev '^COMPETITIVE_ANALYSIS.md$' || true)
          if [ -n "$INVALID" ]; then
            echo "::error::Competitive analysis changed files outside its ownership:"
            printf '%s\n' "$INVALID"
            exit 1
          fi

          BRANCH=$(git branch --show-current)
          git push origin "$BRANCH"

          {
            echo "## Summary"
            echo
            echo "Codex Team A competitive analysis updates."
            echo
            echo "## Codex Output"
            echo
            cat codex-competitive-output.md
          } > pr-body.md

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --title "chore: update competitive analysis" \
            --label agent-created \
            --body-file pr-body.md

      - name: Upload competitive analysis output
        uses: actions/upload-artifact@v4
        with:
          name: codex-competitive-analysis-${{ github.run_number }}
          path: codex-competitive-output.md
