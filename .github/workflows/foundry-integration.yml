name: "Foundry Integration Smoke Test"

on:
  workflow_call:                  # Reusable workflow (called by beta.yml)
    inputs:
      require_credentials:
        # When true, the job FAILS (rather than skipping green) if Foundry credentials are unset.
        # A release publish must not ship on a build whose smoke test silently did not run.
        description: "Fail instead of skipping when Foundry credentials are unavailable"
        required: false
        type: boolean
        default: false
      allowed_console_error_patterns:
        # Comma-separated regex sources APPENDED to the harness's in-source ignoredErrorPatterns
        # defaults — a per-run way to admit a known-benign Foundry console/pageerror artefact without
        # a source edit. It NEVER waives a failed step, and it cannot reopen require_credentials: a
        # run with missing credentials fails regardless of this input.
        description: "Comma-separated console-error waiver patterns appended to the in-source defaults"
        required: false
        type: string
        default: ""
  workflow_dispatch:              # Manual trigger (allows testing on demand)
    inputs:
      require_credentials:
        description: "Fail instead of skipping when Foundry credentials are unavailable"
        required: false
        type: boolean
        default: false
      allowed_console_error_patterns:
        description: "Comma-separated console-error waiver patterns appended to the in-source defaults"
        required: false
        type: string
        default: ""

concurrency:
  group: foundry-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write                   # Allow opening issues on failure

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20           # Full pipeline: up + smoke + down
    env:
      FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
      FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
      FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
      FOUNDRY_TELEMETRY: "false"
      FOUNDRY_ADMIN_KEY: fabricate-test-admin
      FOUNDRY_URL: http://localhost:30100
      # `rc` profile: real Foundry boot, fixture creation, one gathering
      # success, craft a Healing Potion, console-error health, minimal
      # screenshot budget. Full screenshot regeneration runs in `full`
      # (local + the scheduled visual-regression workflow).
      FOUNDRY_SMOKE_PROFILE: rc

    steps:
      - uses: actions/checkout@v6

      - name: Check Foundry credentials
        env:
          REQUIRE_CREDENTIALS: ${{ inputs.require_credentials }}
        run: |
          if [ -z "$FOUNDRY_USERNAME" ] || [ -z "$FOUNDRY_PASSWORD" ]; then
            if [ "$REQUIRE_CREDENTIALS" = "true" ]; then
              echo "::error::Foundry credentials are required for this run (require_credentials=true) but are unset. Failing the smoke job."
              exit 1
            fi
            echo "::warning::Foundry credentials not available. Skipping smoke test."
            echo "SKIP_SMOKE=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        if: env.SKIP_SMOKE != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SKIP_SMOKE != 'true'
        run: npm ci

      # Cache the Playwright Chromium download keyed on package-lock so the
      # ~30 MB install only runs when playwright itself bumps. Saves
      # ~20–40s per warm run.
      - name: Cache Playwright Chromium
        if: env.SKIP_SMOKE != 'true'
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: env.SKIP_SMOKE != 'true' && steps.cache-playwright.outputs.cache-hit != 'true'
        run: npm run test:foundry:install

      - name: Build module
        if: env.SKIP_SMOKE != 'true'
        run: npm run build

      # Cache the Foundry binary archive (used by foundry-test-up.mjs's
      # `configureCachedReleaseUrl`) keyed on the felddy image tag pinned
      # in docker-compose.foundry.yml. Saves ~30–90s per cold run by
      # skipping the Foundry release download.
      - name: Cache Foundry binary
        if: env.SKIP_SMOKE != 'true'
        uses: actions/cache@v5
        with:
          path: .foundry-e2e/cache
          key: foundry-binary-${{ runner.os }}-${{ hashFiles('docker-compose.foundry.yml') }}

      # Cache the dnd5e game system fetched by foundry-fetch-systems.mjs.
      # Saves ~10–20s per warm run.
      - name: Cache dnd5e system
        if: env.SKIP_SMOKE != 'true'
        uses: actions/cache@v5
        with:
          path: .foundry-e2e/systems
          key: foundry-systems-${{ runner.os }}-${{ hashFiles('scripts/foundry-fetch-systems.mjs') }}

      - name: Run smoke test (up → run → down)
        if: env.SKIP_SMOKE != 'true'
        # The module is already built by the dedicated "Build module" step above
        # (cached layer + clearer log attribution), so skip the orchestrator's
        # own step-0 build to avoid building twice.
        # allowed_console_error_patterns reaches foundry-test-run.mjs via this env var:
        # foundry-test.mjs forwards process.env to the run script but not extra argv.
        env:
          FOUNDRY_SKIP_BUILD: '1'
          FOUNDRY_ALLOWED_CONSOLE_ERROR_PATTERNS: ${{ inputs.allowed_console_error_patterns }}
        run: npm run test:foundry

      - name: Upload test artifacts
        if: always() && env.SKIP_SMOKE != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: foundry-smoke-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Open GitHub issue on failure
        if: failure() && env.SKIP_SMOKE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "foundry-smoke-failure" \
            --json number \
            --limit 1 \
            | jq -r '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "Smoke test failed again in run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Foundry smoke test failing (run #${{ github.run_number }})" \
              --label "defect,foundry-smoke-failure,triage" \
              --body "The Foundry integration smoke test failed.

              **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              **Branch:** \`${{ github.ref_name }}\`
              **Commit:** \`${{ github.sha }}\`

              Check the \`foundry-smoke-results\` artifact for screenshots and \`summary.json\`."
          fi
