name: "Foundry Integration Smoke Test"

on:
  workflow_call:                  # Reusable workflow (called by release.yml)
  workflow_dispatch:              # Manual trigger (allows testing on demand)
  schedule:
    - cron: '0 4 * * 1'          # Weekly: Monday 04:00 UTC (nightly cadence)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'module.json'
      - 'docker-compose.foundry.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'module.json'
      - 'docker-compose.foundry.yml'

concurrency:
  # Scope to PR number on pull_request, or ref on push/schedule/dispatch.
  # This prevents PRs from queuing behind each other or behind main pushes.
  group: foundry-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true        # Cancel stale runs when a new push arrives

permissions:
  contents: read
  issues: write                   # Allow opening issues on failure

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20           # Full pipeline: up + smoke + down
    # Skip on fork PRs where Foundry credentials are unavailable
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
      FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
      FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
      FOUNDRY_TELEMETRY: "false"
      FOUNDRY_ADMIN_KEY: fabricate-test-admin
      FOUNDRY_URL: http://localhost:30000

    steps:
      - uses: actions/checkout@v4

      - name: Check Foundry credentials
        run: |
          if [ -z "$FOUNDRY_USERNAME" ] || [ -z "$FOUNDRY_PASSWORD" ]; then
            echo "::warning::Foundry credentials not available. Skipping smoke test."
            echo "SKIP_SMOKE=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        if: env.SKIP_SMOKE != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: env.SKIP_SMOKE != 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: env.SKIP_SMOKE != 'true'
        run: npm run test:foundry:install

      - name: Build module
        if: env.SKIP_SMOKE != 'true'
        run: npm run build

      - name: Run smoke test (up → run → down)
        if: env.SKIP_SMOKE != 'true'
        run: npm run test:foundry

      - name: Upload test artifacts
        if: always() && env.SKIP_SMOKE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: foundry-smoke-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Open GitHub issue on failure
        if: failure() && env.SKIP_SMOKE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "foundry-smoke-failure" \
            --json number \
            --limit 1 \
            | jq -r '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "Smoke test failed again in run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Foundry smoke test failing (run #${{ github.run_number }})" \
              --label "defect,foundry-smoke-failure,triage" \
              --body "The Foundry integration smoke test failed.

              **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              **Branch:** \`${{ github.ref_name }}\`
              **Commit:** \`${{ github.sha }}\`

              Check the \`foundry-smoke-results\` artifact for screenshots and \`summary.json\`."
          fi
