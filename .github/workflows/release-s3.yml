name: "Publish to S3"

# Reusable per-channel publisher. Takes a release TAG, derives its version, checks out that
# tagged commit, builds, and publishes to the requested channel's S3 targets. Called by beta.yml
# (channel: beta) and, in later issue #627 chunks, by the early-access/public promotion workflows.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.4.0-beta.3 or v1.4.0)"
        required: true
        type: string
      channel:
        description: "Channel to publish (beta, early-access, public, or a hotfix line)"
        required: false
        type: string
        default: beta
      check_heads:
        description: "Read and report every target's head + the guard verdict; publish nothing"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry-run: build and stage but do not upload"
        required: false
        type: boolean
        default: false
      overwrite:
        description: "Allow overwriting an existing versioned zip"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.4.0-beta.3 or v1.4.0)"
        required: true
        type: string
      channel:
        description: "Channel to publish (beta, early-access, public, or a hotfix line)"
        required: false
        type: string
        default: beta
      check_heads:
        description: "Read and report every target's head + the guard verdict; publish nothing"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry-run: build and stage but do not upload"
        required: false
        type: boolean
        default: false
      overwrite:
        description: "Allow overwriting an existing versioned zip"
        required: false
        type: boolean
        default: false
    secrets:
      # Secrets are NOT inherited by reusable workflows — the caller (beta.yml, and later the
      # early-access/public promotions) must pass these through explicitly. The publish refuses to
      # run if a channel declares tester groups but its tester-path secret is unset.
      S3_TESTER_PATH_SECRET:
        description: "Secret directory segment for the closed-beta tester feed path"
        required: false
      S3_EARLY_ACCESS_PATH_SECRET:
        description: "Secret directory segment for the patron early-access tester feed path"
        required: false

# id-token: write lets the workflow request a GitHub OIDC token, which is
# exchanged with AWS STS for short-lived role credentials. AWS access is
# controlled entirely by the IAM role's trust + permissions policies.
permissions:
  id-token: write
  contents: read

jobs:
  release-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-level (NOT workflow-level) so it survives being called as a reusable workflow, and
    # per-channel so a beta publish and a public publish do not serialise needlessly. cancel-in-
    # progress is false: a second push must QUEUE behind an in-flight publish, never cancel it
    # mid-loop and leave a half-written (channel-manifest-but-not-tester) state behind.
    concurrency:
      group: release-s3-${{ inputs.channel }}
      cancel-in-progress: false
    steps:
      # Tag validation runs AFTER checkout (it needs scripts/), not before it. The
      # validator is deliberately zero-dependency, so it runs on the runner's
      # preinstalled Node — before setup-node and npm ci.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          # Derive the required tag kind FROM the channel, never `--kind any`. The head guard in
          # release-s3.js only refuses BACKWARD moves, so a stable tag on `channel: beta` would pass
          # both validation and the guard (stable compares newer than beta = "forward") and pollute
          # the beta head with a stable version. beta accepts a beta/rc prerelease tag (what
          # BETA_TAG_RE matches); every other channel (early-access, public, a hotfix N.N.x) takes a
          # stable tag.
          KIND=$([ "$CHANNEL" = "beta" ] && echo beta || echo stable)
          VERSION=$(node scripts/validate-release-tag.mjs "$RELEASE_TAG" --kind "$KIND")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $RELEASE_TAG → version $VERSION (channel $CHANNEL, kind $KIND)"

      - name: Validate tag exists
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! git tag -l "$RELEASE_TAG" | grep -q .; then
            echo "::error::Tag '$RELEASE_TAG' does not exist"
            exit 1
          fi

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: git checkout "$RELEASE_TAG"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials via OIDC
        # Credentials are needed for a real publish AND for a `--check-heads` read. They are skipped
        # only on a dry-run that is NOT also reading heads: the script imports no AWS SDK and reaches
        # no bucket when `--dry-run` is set alone.
        if: ${{ !inputs.dry_run || inputs.check_heads }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Publish to S3
        env:
          S3_RELEASE_BUCKET: ${{ vars.S3_RELEASE_BUCKET }}
          RELEASE_BASE_URL: ${{ vars.RELEASE_BASE_URL }}
          # Secret directory segments for the private tester feed paths. GitHub masks their values
          # in logs; the script also withholds all S3 keys/URLs in CI and refuses to publish a
          # channel's tester groups when that channel's tester-path secret is unset.
          S3_TESTER_PATH_SECRET: ${{ secrets.S3_TESTER_PATH_SECRET }}
          S3_EARLY_ACCESS_PATH_SECRET: ${{ secrets.S3_EARLY_ACCESS_PATH_SECRET }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # --source-sha is the tagged commit ACTUALLY being built, taken from the checked-out tree.
          # It must NOT come from GITHUB_SHA: the "Checkout release tag" step above did
          # `git checkout "$tag"`, so GITHUB_SHA still names the ref that triggered the run, not the
          # commit whose bytes this zip carries. The provenance guard keys resume/overwrite on it.
          SOURCE_SHA="$(git rev-parse HEAD)"
          node scripts/release-s3.js \
            --version "$VERSION" \
            --channel "$CHANNEL" \
            --source-sha "$SOURCE_SHA" \
            ${{ inputs.check_heads == true && '--check-heads' || '' }} \
            ${{ inputs.dry_run == true && '--dry-run' || '' }} \
            ${{ inputs.overwrite == true && '--overwrite' || '' }}
