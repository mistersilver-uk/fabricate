name: Claude Code Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    # Manual PR review trigger: comment `/claude-review` on the PR.
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'opened' &&
        !startsWith(github.event.pull_request.head.ref, 'agent/issue-') &&
        github.event.pull_request.user.type != 'Bot'
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot' &&
        contains(github.event.comment.body, '/claude-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
      REVIEW_TRIGGER: ${{ github.event_name == 'issue_comment' && 'manual comment command (/claude-review)' || 'pull request opened' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.event.pull_request.head.sha }}

      - name: Prepare review context
        run: |
          gh pr view "$PR_NUMBER" \
            --json number,title,author,headRefName,baseRefName,body,closingIssuesReferences,url \
            > /tmp/claude-review-pr.json

          {
            echo "# Claude Review Context"
            echo
            echo "- Trigger: $REVIEW_TRIGGER"
            echo "- PR: #$(jq -r '.number' /tmp/claude-review-pr.json) $(jq -r '.title' /tmp/claude-review-pr.json)"
            echo "- URL: $(jq -r '.url' /tmp/claude-review-pr.json)"
            echo "- Author: $(jq -r '.author.login' /tmp/claude-review-pr.json)"
            echo "- Head branch: $(jq -r '.headRefName' /tmp/claude-review-pr.json)"
            echo "- Base branch: $(jq -r '.baseRefName' /tmp/claude-review-pr.json)"
            echo
            echo "## PR Body"
            jq -r '.body // "_No PR body provided._"' /tmp/claude-review-pr.json
            echo
          } > /tmp/claude-review-context.md

          ISSUE_COUNT=$(jq '.closingIssuesReferences | length' /tmp/claude-review-pr.json)
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            ISSUE_NUMBER=$(jq -r '.closingIssuesReferences[0].number' /tmp/claude-review-pr.json)
            gh issue view "$ISSUE_NUMBER" --json number,title,body,url > /tmp/claude-review-issue.json
            {
              echo "## Linked Issue"
              echo
              echo "- Issue: #$(jq -r '.number' /tmp/claude-review-issue.json) $(jq -r '.title' /tmp/claude-review-issue.json)"
              echo "- URL: $(jq -r '.url' /tmp/claude-review-issue.json)"
              echo
              jq -r '.body // "_No issue body provided._"' /tmp/claude-review-issue.json
            } >> /tmp/claude-review-context.md
          else
            {
              echo "## Linked Issue"
              echo
              echo "No linked issue detected."
            } >> /tmp/claude-review-context.md
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}
            TRIGGER: ${{ env.REVIEW_TRIGGER }}

            Before reviewing, read these files in order:
            1. `/tmp/claude-review-context.md`
            2. `AGENTS.md`
            3. `spec/README.md`

            Then inspect the current PR diff, existing review threads/comments, and PR checks.

            Review this pull request with a focus on:
            - correctness and regression risk
            - missing or stale tests
            - user-visible no-ops or broken migrations
            - security or performance problems when they are concrete

            Review rules:
            - Respect this repo's spec-first process. Specs may intentionally lead implementation; do not flag spec/runtime drift unless this PR claims runtime parity, introduces a user-visible inconsistency, or conflicts with repo policy.
            - Report only net-new material findings against the current head commit.
            - Re-read existing review threads first and do not restate the same issue in multiple comments.
            - Collapse cross-file duplicates into one top-level summary comment.
            - Use inline comments only for the 1-3 highest-signal concrete locations.
            - Cap blocking findings at 3. If there is a blocker, skip minor nits.
            - If there are no net-new material findings, do not post a summary comment.
            - If CI already demonstrates a failure, prefer referencing that failure over speculative duplicate comments.

            Use `gh api` if needed to inspect existing review threads.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) only for specific actionable code issues.
            Only post GitHub comments - don't submit review text as messages.
          claude_args: |
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh api:*),Bash(gh issue view:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          allowed_bots: 'claude[bot]'
