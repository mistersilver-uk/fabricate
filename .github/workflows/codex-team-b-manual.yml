name: "Codex Team B Manual"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to implement"
        required: true
        type: string

concurrency:
  group: codex-team-b-manual-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare issue context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .git/codex-team-b-context

          ISSUE_NUMBER="${{ inputs.issue_number }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json title -q .title)

          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json body \
            -q .body > .git/codex-team-b-context/issue-body.txt

          cat > .git/codex-team-b-context/issue-meta.md <<EOF
          # Selected Issue

          - Repository: ${{ github.repository }}
          - Issue Number: #${ISSUE_NUMBER}
          - Issue Title: ${ISSUE_TITLE}
          EOF

          echo "ISSUE_NUMBER=${ISSUE_NUMBER}" >> "$GITHUB_ENV"
          echo "ISSUE_TITLE=${ISSUE_TITLE}" >> "$GITHUB_ENV"

      - name: Mark issue in-progress
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --add-label in-progress

      - name: Create working branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}-codex-run-${{ github.run_number }}-attempt-${{ github.run_attempt }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Plan and implement with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5-codex
          effort: medium
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-b-manual.md

      - name: Validate before push
        id: validate
        run: |
          COMMITS_AHEAD=$(git rev-list origin/main..HEAD --count)
          UNCOMMITTED=false

          if ! git diff --cached --quiet || ! git diff --quiet; then
            UNCOMMITTED=true
          fi

          if [ "$COMMITS_AHEAD" -eq 0 ] && [ "$UNCOMMITTED" = "false" ]; then
            echo "No changes to push."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UNCOMMITTED" = "true" ]; then
            echo "Found uncommitted changes — staging and committing..."
            git add -A
            git commit -m "chore(#${ISSUE_NUMBER}): stage uncommitted codex changes"
          fi

          npx commitlint --from HEAD~1 --to HEAD --verbose
          npm test
          npm run build

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push and create PR
        if: steps.validate.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH"

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --title "#${ISSUE_NUMBER} — ${ISSUE_TITLE}" \
            --label agent-created \
            --body "$(cat <<EOF
          ## Summary

          Manual Codex Team B implementation for #${ISSUE_NUMBER}.

          ## Test plan

          - [ ] Review code changes
          - [ ] Verify tests pass: \`npm test\`
          - [ ] Verify build: \`npm run build\`
          - [ ] Manual verification if applicable

          Closes #${ISSUE_NUMBER}

          ---
          Generated by the manual Codex Team B workflow
          EOF
          )"

      - name: Mark issue agent-failed on no-op
        if: steps.validate.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress \
            --add-label agent-failed || true

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body "Manual Codex Team B workflow completed but produced no code changes. Returning the issue to the backlog for review."

      - name: Cleanup on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress \
            --add-label agent-failed || true

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body "Manual Codex Team B workflow failed. [View run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          Remove the \`agent-failed\` label to allow retry." || true

          if [ -n "${BRANCH:-}" ]; then
            gh api \
              --method DELETE \
              "repos/${{ github.repository }}/git/refs/heads/$BRANCH" \
              2>/dev/null && echo "Deleted remote branch $BRANCH" \
              || echo "Branch $BRANCH was not pushed — nothing to delete"
          fi
