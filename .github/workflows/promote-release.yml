name: "Promote RC to Release"

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (e.g. v1.0.0-rc.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate RC tag
        run: |
          if ! echo "${{ inputs.rc_tag }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
            echo "::error::Tag '${{ inputs.rc_tag }}' does not match RC pattern v*.*.*-rc.*"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag exists
        run: |
          if ! git tag -l "${{ inputs.rc_tag }}" | grep -q .; then
            echo "::error::Tag '${{ inputs.rc_tag }}' does not exist"
            exit 1
          fi

      - name: Extract base version
        id: version
        run: |
          BASE=$(echo "${{ inputs.rc_tag }}" | sed 's/^v//; s/-rc\.[0-9]*$//')
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Promoting ${{ inputs.rc_tag }} → v$BASE"

      - name: Checkout RC tag
        run: git checkout "${{ inputs.rc_tag }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build release
        run: node scripts/release.js --version ${{ steps.version.outputs.base }}

      - name: Aggregate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="${{ steps.version.outputs.base }}"
          NOTES=""

          # Collect notes from all RC tags for this base version
          for tag in $(git tag -l "v${BASE}-rc.*" | sort -V); do
            RC_NOTES=$(gh release view "$tag" --json body --jq '.body' 2>/dev/null || echo "")
            if [ -n "$RC_NOTES" ]; then
              NOTES="${NOTES}

          ## ${tag}

          ${RC_NOTES}"
            fi
          done

          if [ -z "$NOTES" ]; then
            NOTES="Release ${BASE} promoted from ${{ inputs.rc_tag }}"
          fi

          # Write to file to avoid shell escaping issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="${{ steps.version.outputs.base }}"
          gh release create "v${BASE}" \
            "dist/fabricate-v${BASE}.zip" \
            dist/module.json \
            --title "v${BASE}" \
            --notes-file /tmp/release-notes.md \
            --latest
