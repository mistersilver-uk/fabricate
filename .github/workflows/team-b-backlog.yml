name: "Team B: Codex Backlog Processing"

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Specific issue number to work on (optional)"
        required: false
        type: string
      max_parallel:
        description: "Maximum issues to process in parallel when issue_number is omitted"
        required: false
        type: string
        default: "3"

concurrency:
  group: team-b-backlog-selector
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  CODEX_MODEL: gpt-5.4

jobs:
  pick-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      issues_json: ${{ steps.select.outputs.issues_json }}
      has_issues: ${{ steps.select.outputs.has_issues }}
    steps:
      - name: Select eligible issues
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          MAX_PARALLEL: ${{ inputs.max_parallel || '3' }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
          echo "Using default branch ${DEFAULT_BRANCH}"
          case "$MAX_PARALLEL" in
            ''|*[!0-9]*) MAX_PARALLEL=3 ;;
          esac
          if [ "$MAX_PARALLEL" -lt 1 ]; then
            MAX_PARALLEL=1
          fi
          if [ "$MAX_PARALLEL" -gt 6 ]; then
            MAX_PARALLEL=6
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json title -q .title)
            ISSUES_JSON=$(jq -cn --argjson number "$ISSUE_NUMBER" --arg title "$TITLE" '[{number: $number, title: $title}]')
            echo "issues_json=$ISSUES_JSON" >> "$GITHUB_OUTPUT"
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUES_WITH_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json headRefName -q '.[].headRefName' \
            | sed -n 's|^agent/issue-\([0-9][0-9]*\).*|\1|p' \
            | jq -R -s 'split("\n") | map(select(. != "") | tonumber)')

          CANDIDATES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,title,labels,body \
            --limit 100 \
            | jq -c --argjson prs "$ISSUES_WITH_PRS" '[.[] | select(
                (.labels | map(.name) | contains(["triage"]) | not) and
                (.labels | map(.name) | contains(["in-progress"]) | not) and
                (.labels | map(.name) | contains(["agent-failed"]) | not) and
                (.number as $n | $prs | index($n) | not)
              )][0:12]')

          echo '[]' > /tmp/selected-issues.json
          : > /tmp/selected-paths.txt
          UNKNOWN_SELECTED=false

          while IFS= read -r issue; do
            COUNT=$(jq 'length' /tmp/selected-issues.json)
            if [ "$COUNT" -ge "$MAX_PARALLEL" ]; then
              break
            fi

            BODY=$(jq -r '.body // ""' <<< "$issue")
            PATHS=$(
              {
                printf '%s\n' "$BODY" | sed -n 's/^- `\([^`]*\)`.*/\1/p'
                printf '%s\n' "$BODY" | grep -Eo '([A-Za-z0-9_.-]+/)+[A-Za-z0-9_.-]+(\.[A-Za-z0-9_.-]+)?' || true
              } | grep -Ev '^(https?|app|file)://' | sort -u
            )
            CONFLICT=false

            if [ -z "$PATHS" ] || printf '%s\n' "$PATHS" | grep -Fxq "UNKNOWN"; then
              if [ "$UNKNOWN_SELECTED" = "true" ]; then
                continue
              fi
              UNKNOWN_SELECTED=true
              PATHS="UNKNOWN-${COUNT}"
            fi

            if [ -n "$PATHS" ]; then
              while IFS= read -r path; do
                if [ -n "$path" ] && grep -Fxq "$path" /tmp/selected-paths.txt; then
                  CONFLICT=true
                  break
                fi
              done <<< "$PATHS"
            fi

            if [ "$CONFLICT" = "true" ]; then
              continue
            fi

            jq --argjson issue "$(jq '{number, title}' <<< "$issue")" '. + [$issue]' /tmp/selected-issues.json > /tmp/selected-issues-next.json
            mv /tmp/selected-issues-next.json /tmp/selected-issues.json

            if [ -n "$PATHS" ]; then
              printf '%s\n' "$PATHS" >> /tmp/selected-paths.txt
              sort -u /tmp/selected-paths.txt -o /tmp/selected-paths.txt
            fi
          done < <(jq -c '.[]' <<< "$CANDIDATES")

          ISSUES_JSON=$(jq -c . /tmp/selected-issues.json)
          if [ "$ISSUES_JSON" = "[]" ]; then
            echo "No eligible issues found."
            echo "issues_json=[]" >> "$GITHUB_OUTPUT"
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected issues: $ISSUES_JSON"
          echo "issues_json=$ISSUES_JSON" >> "$GITHUB_OUTPUT"
          echo "has_issues=true" >> "$GITHUB_OUTPUT"

  implement:
    needs: pick-tasks
    if: needs.pick-tasks.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        issue: ${{ fromJSON(needs.pick-tasks.outputs.issues_json) }}
    concurrency:
      group: team-b-issue-${{ matrix.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ matrix.issue.number }}
      ISSUE_TITLE: ${{ matrix.issue.title }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare issue context
        run: |
          mkdir -p .git/codex-team-b-context
          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json body \
            -q .body > .git/codex-team-b-context/issue-body.txt

          {
            echo "# Selected Issue"
            echo
            echo "- Repository: ${{ github.repository }}"
            echo "- Issue Number: #${ISSUE_NUMBER}"
            echo "- Issue Title: ${ISSUE_TITLE}"
          } > .git/codex-team-b-context/issue-meta.md

      - name: Mark issue in-progress
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --add-label in-progress

      - name: Create working branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}-codex-run-${{ github.run_number }}-attempt-${{ github.run_attempt }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Plan and implement with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-team-b.md
          output-file: codex-output.md

      - name: Validate before push
        id: validate
        run: |
          COMMITS_AHEAD=$(git rev-list origin/${{ github.event.repository.default_branch || 'main' }}..HEAD --count)
          UNCOMMITTED=false

          if [ -n "$(git status --porcelain --untracked-files=normal -- . ':!codex-output.md' ':!pr-body.md' ':!test-results')" ]; then
            UNCOMMITTED=true
          fi

          if [ "$COMMITS_AHEAD" -eq 0 ] && [ "$UNCOMMITTED" = "false" ]; then
            echo "No changes to push."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UNCOMMITTED" = "true" ]; then
            git add -A -- . ':!codex-output.md' ':!pr-body.md' ':!test-results'
            git commit -m "chore(#${ISSUE_NUMBER}): stage uncommitted codex changes"
          fi

          npx commitlint --from "origin/${{ github.event.repository.default_branch || 'main' }}" --to HEAD --verbose
          npm test
          npm run build

          CHANGED_FILES=$(git diff --name-only "origin/${{ github.event.repository.default_branch || 'main' }}..HEAD")
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(src/ui/|styles/)|\.(svelte|css)$'; then
            echo "ui_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui_changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload screenshot artifacts
        if: always() && steps.validate.outputs.ui_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex-ui-evidence-${{ matrix.issue.number }}-${{ github.run_number }}
          path: test-results/
          if-no-files-found: ignore

      - name: Push and create PR
        if: steps.validate.outputs.has_changes == 'true'
        id: raise_pr
        env:
          PUSH_TOKEN: ${{ secrets.WORKFLOW_GH_TOKEN != '' && secrets.WORKFLOW_GH_TOKEN || github.token }}
          PRIMARY_PR_TOKEN: ${{ github.token }}
          FALLBACK_PR_TOKEN: ${{ secrets.WORKFLOW_GH_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          push_with_token() {
            local token="$1"
            git remote set-url origin "https://x-access-token:${token}@github.com/${{ github.repository }}.git"
            git push origin "$BRANCH" 2>&1
          }

          if ! push_with_token "$PUSH_TOKEN"; then
            echo "::warning::Push failed with primary token; falling back to github.token"
            if [ "$PUSH_TOKEN" != "$PRIMARY_PR_TOKEN" ]; then
              push_with_token "$PRIMARY_PR_TOKEN"
            else
              echo "::error::Push failed and no fallback token is available."
              exit 1
            fi
          fi

          PR_TITLE=$(git log "origin/${DEFAULT_BRANCH}..HEAD" --format='%s' --reverse | head -1)
          if [ -z "$PR_TITLE" ] || ! echo "$PR_TITLE" | grep -qE '^[a-z]+(\(.*\))?!?: '; then
            PR_TITLE="chore(#${ISSUE_NUMBER}): ${ISSUE_TITLE}"
          fi

          SCREENSHOT_NOTE="_No UI files changed._"
          if [ "${{ steps.validate.outputs.ui_changed }}" = "true" ]; then
            if find test-results -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' \) 2>/dev/null | grep -q .; then
              SCREENSHOT_PATHS=$(find test-results -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' \) | sort)
              SCREENSHOT_NOTE=$(printf 'Screenshot artifacts were uploaded as `codex-ui-evidence-%s-${{ github.run_number }}`.\n\n%s' "$ISSUE_NUMBER" "$SCREENSHOT_PATHS")
            elif grep -q '^SCREENSHOTS_NEEDED:' codex-output.md 2>/dev/null; then
              SCREENSHOT_NOTE="> $(grep '^SCREENSHOTS_NEEDED:' codex-output.md | head -1)"
            else
              SCREENSHOT_NOTE="> SCREENSHOTS_NEEDED: UI files changed, but no screenshot artifact was produced by the agent."
            fi
          fi

          {
            echo "## Summary"
            echo
            echo "Automated Codex implementation for #${ISSUE_NUMBER}."
            echo
            echo "## Codex Output"
            echo
            cat codex-output.md
            echo
            echo "## Test plan"
            echo
            echo "- [x] \`npm test\`"
            echo "- [x] \`npm run build\`"
            echo "- [ ] Manual verification if applicable"
            echo
            echo "## Screenshots"
            echo
            echo "$SCREENSHOT_NOTE"
            echo
            echo "Closes #${ISSUE_NUMBER}"
            echo
            echo "---"
            echo "Generated by Team B Codex backlog workflow"
          } > pr-body.md

          PR_OUTPUT="$(mktemp)"
          LAST_PR_ERROR=""

          try_create_pr() {
            local token="$1"
            GH_TOKEN="$token" gh pr create \
              --repo "${{ github.repository }}" \
              --head "$BRANCH" \
              --base "$DEFAULT_BRANCH" \
              --title "$PR_TITLE" \
              --label agent-created \
              --body-file pr-body.md >"$PR_OUTPUT" 2>&1
          }

          if try_create_pr "$PRIMARY_PR_TOKEN"; then
            cat "$PR_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
          else
            LAST_PR_ERROR="$(cat "$PR_OUTPUT")"
            if [ -n "$FALLBACK_PR_TOKEN" ] && [ "$FALLBACK_PR_TOKEN" != "$PRIMARY_PR_TOKEN" ]; then
              if try_create_pr "$FALLBACK_PR_TOKEN"; then
                cat "$PR_OUTPUT"
                echo "pr_created=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              LAST_PR_ERROR="$(cat "$PR_OUTPUT")"
            fi

            cat "$PR_OUTPUT"
            if grep -Eq "GitHub Actions is not permitted to create or approve pull requests|Resource not accessible by integration|createPullRequest\\.pullRequest" "$PR_OUTPUT"; then
              MANUAL_PR_URL="${{ github.server_url }}/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${BRANCH}?expand=1"
              echo "::warning::Automatic PR creation is blocked for this token. Open the PR manually: ${MANUAL_PR_URL}"
              echo "pr_created=false" >> "$GITHUB_OUTPUT"
              echo "manual_pr_url=${MANUAL_PR_URL}" >> "$GITHUB_OUTPUT"
            else
              printf '%s\n' "$LAST_PR_ERROR"
              exit 1
            fi
          fi

      - name: Comment manual PR handoff
        if: steps.validate.outputs.has_changes == 'true' && steps.raise_pr.outputs.pr_created == 'false'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "Codex implementation branch \`${BRANCH}\` was pushed successfully, but the workflow could not create a pull request with the configured token. Open it manually: ${{ steps.raise_pr.outputs.manual_pr_url }}"

      - name: Mark issue agent-failed on no-op
        if: steps.validate.outputs.has_changes == 'false'
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress \
            --add-label agent-failed || true

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "Codex Team B workflow completed but produced no code changes. Returning the issue to the backlog for review."

      - name: Cleanup on failure
        if: failure()
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress \
            --add-label agent-failed || true

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "Codex Team B workflow failed. [View run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          Remove the \`agent-failed\` label to allow retry." || true

          if [ -n "${BRANCH:-}" ]; then
            gh api \
              --method DELETE \
              "repos/${{ github.repository }}/git/refs/heads/$BRANCH" \
              2>/dev/null && echo "Deleted remote branch $BRANCH" \
              || echo "Branch $BRANCH was not pushed; nothing to delete"
          fi
