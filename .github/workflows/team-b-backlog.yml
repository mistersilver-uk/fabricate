name: "Team B: Backlog Processing"

on:
  schedule:
    - cron: '0 */1 * * *'          # Every 1 hour
  workflow_dispatch:               # Manual trigger
    inputs:
      issue_number:
        description: "Specific issue number to work on (optional)"
        required: false
        type: string

concurrency:
  group: team-b-backlog
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pick-task:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      issue_number: ${{ steps.select.outputs.issue_number }}
      issue_title: ${{ steps.select.outputs.issue_title }}
    steps:
      - name: Select highest-priority issue
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            NUMBER="${{ inputs.issue_number }}"
            TITLE=$(gh issue view "$NUMBER" --repo "${{ github.repository }}" --json title -q .title)
          else
            # Find the oldest open issue that:
            #   - does NOT have the 'triage' label (humans haven't approved it yet)
            #   - does NOT have the 'in-progress' label (not already being worked)
            #   - does NOT have the 'agent-failed' label (failed on previous attempt)
            #   - IS open
            # gh sorts by created date ascending by default (oldest first = highest priority)
            ISSUE_JSON=$(gh issue list \
              --repo "${{ github.repository }}" \
              --state open \
              --json number,title,labels \
              --limit 50 \
              | jq -r '[.[] | select(
                  (.labels | map(.name) | contains(["triage"]) | not) and
                  (.labels | map(.name) | contains(["in-progress"]) | not) and
                  (.labels | map(.name) | contains(["agent-failed"]) | not)
                )] | first // empty')

            if [ -z "$ISSUE_JSON" ] || [ "$ISSUE_JSON" = "null" ]; then
              echo "No eligible issues found."
              echo "issue_number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            NUMBER=$(echo "$ISSUE_JSON" | jq -r '.number')
            TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          fi

          echo "issue_number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Selected issue #$NUMBER: $TITLE"

  implement:
    needs: pick-task
    if: needs.pick-task.outputs.issue_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mark issue in-progress
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ needs.pick-task.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --add-label in-progress

      - name: Create working branch
        run: |
          BRANCH="agent/issue-${{ needs.pick-task.outputs.issue_number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Plan and implement
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 50
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,Agent"
          prompt: |
            You are running the Team B pipeline for Fabricate. You have four
            agent roles available. Read the agent definitions in .claude/agents/
            to understand each role's responsibilities.

            You are working on issue #${{ needs.pick-task.outputs.issue_number }}:
            "${{ needs.pick-task.outputs.issue_title }}"

            Read the full issue details:
            ```
            gh issue view ${{ needs.pick-task.outputs.issue_number }}
            ```

            Execute this pipeline:

            ## Step 1: Orchestrator (Plan)
            Read the issue acceptance criteria. Analyze task complexity.

            Before planning, search the codebase to locate relevant files:
            - Use Grep to find keywords from the issue (class names, function
              names, UI labels, error messages) across src/ and test/
            - Use Glob to find related files by pattern (e.g. **/*Recipe*,
              **/*crafting*)
            - Read the files you find to understand the existing code structure

            Then write a brief implementation plan that lists the specific
            files to change and tests to write, with line-number references
            where possible.

            ## Step 2: Implementer (Build)
            Follow the implementer agent rules from .claude/agents/implementer.md:
            - Write tests BEFORE implementation (TDD)
            - Run `npm test` after every logical change
            - Run `npm run build` to confirm clean compilation
            - Keep changes focused — one task at a time
            - Follow existing codebase patterns

            ## Step 3: Reviewer (Validate)
            Follow the reviewer agent checklist from .claude/agents/reviewer.md:
            - TypeScript types are correct
            - Tests exist and are meaningful
            - Svelte components follow existing patterns
            - FoundryVTT API usage is correct
            - No console.log in production code
            - `npm test` passes and `npm run build` compiles cleanly

            If review finds issues, fix them before proceeding.

            ## Step 4: Docs Writer (Document)
            Follow the docs-writer agent rules from .claude/agents/docs-writer.md:
            - Update JSDoc on modified source files
            - Update relevant docs/ pages if behavior changed
            - Append a CHANGELOG.md entry referencing #${{ needs.pick-task.outputs.issue_number }}

            ## Final: Commit
            Stage all changes and commit following Conventional Commits format:
            `<type>(#${{ needs.pick-task.outputs.issue_number }}): <short description>`

            Choose the type based on the nature of the change:
            - `feat` — new feature or behaviour
            - `fix` — bug fix
            - `docs` — documentation only
            - `refactor` — code restructure, no behaviour change
            - `test` — tests only
            - `chore` — maintenance, dependencies, tooling

            Example: `feat(#${{ needs.pick-task.outputs.issue_number }}): add cauldron mode`

            After committing, validate with: `npx commitlint --from HEAD~1 --to HEAD --verbose`

            IMPORTANT RULES:
            - NEVER remove the `triage` label from any issue.
            - Do NOT close the issue — the PR will reference it.
            - Do NOT merge anything.

      - name: Validate before push
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to push."
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "HAS_CHANGES=true" >> "$GITHUB_ENV"

          echo "Running tests to verify implementation is complete…"
          npm test
          npm run build

      - name: Push and create PR
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin "$BRANCH"

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --title "#${{ needs.pick-task.outputs.issue_number }} — ${{ needs.pick-task.outputs.issue_title }}" \
            --label agent-created \
            --body "$(cat <<'EOF'
          ## Summary

          Automated implementation for #${{ needs.pick-task.outputs.issue_number }}.

          ## Pipeline

          - [x] Orchestrator: planned
          - [x] Implementer: built
          - [x] Reviewer: validated
          - [x] Docs Writer: documented

          ## Test plan

          - [ ] Review code changes
          - [ ] Verify tests pass: `npm test`
          - [ ] Verify build: `npm run build`
          - [ ] Manual verification if applicable

          Closes #${{ needs.pick-task.outputs.issue_number }}

          ---
          Generated by Team B automated pipeline
          EOF
          )"

      - name: Remove in-progress on success (no changes)
        if: env.HAS_CHANGES == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ needs.pick-task.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress
            --add-label agent-failed
          gh issue comment "${{ needs.pick-task.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Agent completed pipeline but produced no code changes. Returning to backlog for review."

      - name: Cleanup on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Swap in-progress for agent-failed so the issue is not retried automatically
          gh issue edit "${{ needs.pick-task.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --remove-label in-progress \
            --add-label agent-failed

          # Post a comment with the run link for debugging
          gh issue comment "${{ needs.pick-task.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Agent pipeline failed. [View run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          Remove the \`agent-failed\` label to allow retry."

          # Delete remote branch if it was pushed (use gh api — git credentials
          # are revoked by the Claude Code Action post-step before this runs)
          gh api \
            --method DELETE \
            "repos/${{ github.repository }}/git/refs/heads/$BRANCH" \
            2>/dev/null && echo "Deleted remote branch $BRANCH" \
            || echo "Branch $BRANCH was not pushed — nothing to delete"